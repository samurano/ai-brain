        <article class="card single-card text-center">
          <span class="badge inline" style="justify-self: center">Шаг 2 из 2</span>

          <div class="row" style="justify-content: center; margin-top: 24px">
            <a id="join-prechat-btn" class="btn btn-primary" href="#" target="_blank" rel="noreferrer">

          </div>

          <p class="kicker" style="margin-top: 16px">
            Если кнопка не работает: напишите в
            <a class="js-support-link" href="https://t.me/ira_deni" target="_blank" rel="noreferrer">поддержку</a>
